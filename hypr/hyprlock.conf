# BACKGROUND
background {
    monitor =
    path = ~/Wallpaper/wp.png
    blur_passes = 3
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

# GENERAL
general {
    no_fade_in = false
    grace = 0
    disable_loading_bar = false
}

# Day-Month-Date
label {
    monitor =
    text = cmd[update:1000] echo -e "$(date +"%A, %B %d")"
    color = rgba(216, 222, 233, 0.70)
    font_size = 25
    font_family = Google Sans Flex
    position = 0, -150
    halign = center
    valign = center
}

# Hour
label {
    monitor =
    text = cmd[update:1000] echo "<span>$(date +"%M")</span>"
    color = rgba(216, 222, 233, 0.50)
    font_size = 120
    font_family = Google Sans Flex Black
    position = 0, -60
    halign = center
    valign = center
}

# Minute
label {
    monitor =
    text = cmd[update:1000] echo "<span>$(date +"%I")</span>"
    color = rgba(216, 222, 233, 0.90)
    font_size = 120
    font_family = Google Sans Flex Black
    position = 0, 60
    halign = center
    valign = center
}



# INPUT FIELD
input-field {
    monitor =
    size = 300, 60
    outline_thickness = 2
    dots_size = 0.2 # Scale of input-field height, 0.2 - 0.8
    dots_spacing = 0.2 # Scale of dots' absolute size, 0.0 - 1.0
    dots_center = true
    outer_color = rgba(0, 0, 0, 0)
    inner_color = rgba(255, 255, 255, 0.1)
    font_color = rgb(200, 200, 200)
    fade_on_empty = false
    font_family = Google Sans Flex Light
    placeholder_text = <span foreground="##ffffff99">Password</span>
    hide_input = false
    position = 0, -450
    halign = center
    valign = center
}

